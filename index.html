<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Vinculación de Cuentas</title>
    <style>
        /* Reseteo para evitar que cualquier margen "empuje" la pantalla */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden; /* Prohibe el movimiento lateral */
            -webkit-text-size-adjust: 100%;
        }

        /* Contenedor optimizado para móviles */
        .container {
            background-color: #24243e;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            
            /* Ajuste de ancho crítico */
            width: 90%;          /* En móviles usa el 90% de la pantalla */
            max-width: 380px;    /* En PC nunca supera este tamaño */
            margin: 20px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #a0a0c0; margin-bottom: 25px; line-height: 1.4; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px; /* 16px evita el zoom automático en iPhone */
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            color: white;
        }

        .btn-twitch { background-color: #9146ff; }
        .btn-discord { background-color: #5865f2; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        #status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            background: rgba(255,255,255,0.05);
        }

        .success { border: 1px solid #2ecc71; color: #2ecc71; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vincular Cuentas</h1>
        <p>Conecta tus perfiles para sincronizar tus datos automáticamente.</p>

        <button id="btn-twitch" class="btn btn-twitch">Conectar con Twitch</button>
        <button id="btn-discord" class="btn btn-discord">Conectar con Discord</button>

        <div id="status-message"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>

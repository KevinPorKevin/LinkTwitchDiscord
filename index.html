<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinculación de Cuentas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #0f0f1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .container {
            background-color: #1c1c2e;
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { color: #a0a0c0; font-size: 0.9rem; margin-bottom: 25px; }
        .btn {
            display: block; width: 100%; padding: 15px; margin-bottom: 12px;
            border: none; border-radius: 10px; font-weight: bold; font-size: 16px;
            color: white; cursor: pointer; text-decoration: none;
        }
        .btn-twitch { background-color: #9146ff; }
        .btn-discord { background-color: #5865f2; }
        .btn:disabled { opacity: 0.5; cursor: default; }

        /* EL CUADRO DE MENSAJE REFORZADO */
        #status-message {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }
        .msg-text {
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.4;
            color: #ffffff !important; /* Forzamos blanco para que se lea bien */
        }
        .btn-reset {
            display: block !important;
            background-color: #ff4b2b !important; /* Rojo brillante */
            color: white !important;
            border: none !important;
            padding: 14px !important;
            border-radius: 8px !important;
            width: 100% !important;
            font-weight: bold !important;
            font-size: 14px !important;
            cursor: pointer !important;
            text-transform: uppercase;
        }
        .success { border-color: #2ecc71 !important; }
        .success .msg-text { color: #2ecc71 !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vincular Cuentas</h1>
        <p>Pulsa los botones para sincronizar tus perfiles.</p>
        <button id="btn-twitch" class="btn btn-twitch">Conectar con Twitch</button>
        <button id="btn-discord" class="btn btn-discord">Conectar con Discord</button>
        <div id="status-message"></div>
    </div>
    <script src="app.js?v=1.1"></script>
</body>
</html>

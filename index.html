<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinculación de Cuentas</title>
    <style>
        /* BLOQUEO TOTAL DE ANCHO */
        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden; /* Prohibido el scroll lateral */
            background-color: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Evita que el navegador reescale el texto por su cuenta */
            -webkit-text-size-adjust: 100%;
        }

        .container {
            background-color: #1c1c2e;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            /* Usamos vmin para asegurar que quepa en cualquier pantalla */
            width: 90vw;
            max-width: 360px;
            z-index: 100;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #fff; }
        p { font-size: 0.9rem; color: #b0b0d0; margin-bottom: 25px; }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px; 
            cursor: pointer;
            color: white;
            text-decoration: none;
        }

        .btn-twitch { background-color: #9146ff; }
        .btn-discord { background-color: #5865f2; }
        
        #status-message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 0.9rem;
            background: rgba(255,255,255,0.05);
        }
        .success { border: 1px solid #2ecc71; color: #2ecc71; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vincular Cuentas</h1>
        <p>Pulsa los botones para sincronizar tus perfiles.</p>
        <button id="btn-twitch" class="btn btn-twitch">Twitch</button>
        <button id="btn-discord" class="btn btn-discord">Discord</button>
        <div id="status-message"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
